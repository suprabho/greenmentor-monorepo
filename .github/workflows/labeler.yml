name: PR Labeler

# pull_request_target lets PRs from forks get labeled too: the labeler
# config and action run from the base branch, never the PR's code, so
# this is safe — the action only reads the file list, it never builds.
on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@v5
        with:
          configuration-path: .github/labeler.yml
          # Remove labels when their paths no longer match on a re-push.
          sync-labels: true
