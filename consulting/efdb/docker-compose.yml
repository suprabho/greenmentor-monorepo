services:
  # Postgres is hosted on Supabase. DATABASE_URL / DATABASE_URL_SYNC in `.env`
  # point at the session pooler. If you ever want a local DB again, re-add a
  # `db:` service with `pgvector/pgvector:pg16` and a `pgdata:` volume.

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    ports:
      - "5173:5173"
    depends_on:
      - backend
    command: npm run dev -- --host

volumes:
  uploads:
