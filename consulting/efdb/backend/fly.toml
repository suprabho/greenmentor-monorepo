# fly.toml app configuration file generated for efdb-api on 2026-05-28T09:31:48+05:30
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'efdb-api'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile.prod'

[deploy]
  release_command = 'alembic upgrade head'

[env]
  CORS_ORIGINS = 'https://efdb-kappa.vercel.app'
  UPLOAD_DIR = '/data/uploads'

[[mounts]]
  source = 'efdb_uploads'
  destination = '/data'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 100
    soft_limit = 50

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 2048
