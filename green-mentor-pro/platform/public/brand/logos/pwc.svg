<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 80" role="img" aria-label="PwC">
  <title>PwC</title>
  <!-- Five stacked marks above the wordmark, evocative of the official PwC tile pattern -->
  <g fill="#000">
    <rect x="16"  y="6" width="22" height="14" rx="2"/>
    <rect x="44"  y="6" width="22" height="14" rx="2"/>
    <rect x="72"  y="6" width="22" height="14" rx="2"/>
    <rect x="100" y="6" width="22" height="14" rx="2"/>
    <rect x="128" y="6" width="22" height="14" rx="2"/>
  </g>
  <text
    x="80"
    y="68"
    text-anchor="middle"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-weight="800"
    font-size="48"
    letter-spacing="-1"
    fill="#000"
  >pwc</text>
</svg>
